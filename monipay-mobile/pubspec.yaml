name: monipay
description: Monipay - crypto-native payment platform
publish_to: "none"
version: 0.1.0+1

environment:
  # Compatible with Flutter 3.16.x (Dart 3.2.x) on macOS 12
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.0.0
  supabase_flutter: ^2.5.0
  web3dart: ^2.7.1
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.3.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.5
  http: ^1.2.0
  intl: ^0.19.0
  flutter_dotenv: ^5.1.0
  # 5.x works with Flutter 3.16.x; 6.x requires Flutter >=3.19
  google_fonts: ^5.1.0
  path_drawing: ^0.5.1
  google_sign_in: ^5.0.0
  googleapis: ^11.0.0
  pointycastle: ^3.7.3
  bcrypt: ^1.1.3
  crypto: ^3.0.2
  hashlib: ^2.3.0
  lucide_icons: ^0.257.0
  flutter_svg: ^0.23.0+1
  share_plus: ^7.2.2
  url_launcher: ^6.2.0
  permission_handler: ^11.3.0
  package_info_plus: ^4.2.0
  dio: ^5.4.0
  # reown_appkit requires Dart 3.4+; add when upgrading: reown_appkit: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/fonts/

